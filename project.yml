name: Laowai
options:
  bundleIdPrefix: com.codefern
  deploymentTarget:
    iOS: "17.0"

targets:
  Laowai:
    type: application
    platform: iOS
    sources:
      - path: Laowai
    resources:
      - path: Laowai/Resources
    info:
      path: Laowai/Info.plist
      properties:
        CFBundleDisplayName: Laowai
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Used to translate menus and signs"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.codefern.laowai
      SWIFT_VERSION: "5.10"
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
